name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'hibi_front/**'
  pull_request:
    branches: [main]
    paths:
      - 'hibi_front/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: hibi_front
        run: flutter pub get

      - name: Check formatting
        working-directory: hibi_front
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        working-directory: hibi_front
        run: flutter analyze

      - name: Run tests
        working-directory: hibi_front
        run: flutter test
