# application.yml

# 서버 설정
server:
  port: 8080  # 서버 포트 (기본값은 8080)

# Spring 프로파일 설정
spring:
  profiles:
    active: dev  # dev, prod 등 환경별 프로파일 설정

  # 데이터베이스 연결 설정
  datasource:
    url: jdbc:mysql://${DATABASE_URL}:3306/${DATABASE_NAME}
    username: ${DATABASE_USERNAME} # MySQL DB 사용자명
    password: ${DATABASE_PASSWORD} # MySQL DB 비밀번호
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL 드라이버 클래스
    hikari:
      pool-name: HikariCP

  # JPA 설정 (Hibernate) - ddl-auto/show-sql은 프로파일별(application-dev/prod.yml)로 관리
  jpa:
    properties:
      hibernate:
        format_sql: true  # SQL 포매팅
jwt:
  secret: ${JWT_SECRET} # 환경변수 필수 - 절대 커밋하지 말 것 (BASE64 인코딩된 256bit 이상 키)
  expiration: 3600000 # Access Token: 1시간
  refresh-expiration: 604800000 # Refresh Token: 7일

auth:
  social:
    mock-enabled: false # 실제 소셜 API 연동 전까지 소셜 로그인 차단 (로컬 개발 시에만 true)

api:
  version: v1
  base-url: ${EC2_HOST}

cors:
  # 브라우저(웹) 클라이언트 허용 출처. 배포 시 CORS_ALLOWED_ORIGINS 환경변수로 실제 도메인 지정
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}